<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-text">
        <h1>Expense Tracker</h1>
        <p>Track and visualize your spending</p>
      </div>

      <button
        id="themeToggle"
        class="theme-icon-inline"
        aria-label="Toggle Theme"
      ></button>
    </header>

    <section class="dashboard-grid">
      <div class="card balance-card">
        <span>Total Spending</span>
        <h2 id="totalBalance">Rp 0</h2>
      </div>

      <div class="card budget-card">
        <div class="budget-header">
          <span>Spending Limit</span>
          <input
            type="number"
            id="spendingLimit"
            placeholder="Set spending limit"
          >
        </div>

        <div class="progress-bar">
          <div id="budgetProgress"></div>
        </div>

        <p id="budgetStatus">No limit set</p>
      </div>
    </section>

    <section class="main-grid">
      <div class="card">
        <h3>Add Transaction</h3>

        <form id="expenseForm">
          <input
            type="text"
            id="itemName"
            placeholder="Item Name"
            required
          >

          <input
            type="number"
            id="amount"
            placeholder="Amount"
            min="1"
            required
          >

          <select id="category" required>
            <option value="">Select Category</option>
          </select>

          <div class="category-row">
            <input
              type="text"
              id="customCategory"
              placeholder="Custom Category"
            >

            <button
              type="button"
              id="addCategoryBtn"
            >
              Add
            </button>
          </div>

          <button
            type="submit"
            class="primary-btn"
          >
            Add Transaction
          </button>
        </form>
      </div>

      <div class="card chart-card">
        <h3>Spending Distribution</h3>
        <div class="chart-wrapper">
          <canvas id="expenseChart"></canvas>
        </div>
      </div>
    </section>

    <section class="card">
      <h3>Transaction History</h3>
      <div id="transactionList" class="transaction-list"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
