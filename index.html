<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Expense & Budget Visualizer</h1>

      <div class="topbar-actions">
        <select id="sortSelect" aria-label="Sort Transactions">
          <option value="latest">Sort: Latest</option>
          <option value="amountAsc">Amount ↑</option>
          <option value="amountDesc">Amount ↓</option>
          <option value="category">Category</option>
        </select>

        <button id="themeToggle" type="button">🌙 Toggle Theme</button>
      </div>
    </header>

    <section class="balance-card">
      <h2>Total Spending</h2>
      <p id="totalBalance">Rp 0</p>
    </section>

    <section class="grid">
      <div class="panel">
        <h3>Add Transaction</h3>

        <form id="expenseForm">
          <label for="itemName">Item Name</label>
          <input type="text" id="itemName" required />

          <label for="amount">Amount</label>
          <input type="number" id="amount" min="1" required />

          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select Category</option>
          </select>

          <div class="custom-category-wrapper">
            <input
              type="text"
              id="customCategory"
              placeholder="Add Custom Category"
            />
            <button type="button" id="addCategoryBtn">Add</button>
          </div>

          <button type="submit" class="submit-btn">Add Transaction</button>
        </form>
      </div>

      <div class="panel">
        <h3>Spending Distribution</h3>
        <canvas id="expenseChart"></canvas>
      </div>
    </section>

    <section class="panel transaction-panel">
      <h3>Transaction History</h3>
      <div id="transactionList" class="transaction-list"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
